# ~/.config/hypr/hyprland.conf

$src = ~/.config/hypr/hyprlang-src

source = $src/themes/mocha.conf
source = $src/environment.conf
monitor = eDP-1, 1920x1200@60.00300, 0x0, 1.5 # see https://wiki.hyprland.org/Configuring/Monitors/
monitor = HDMI-A-1, preferred, auto-right, 1.5 # see https://wiki.hyprland.org/Configuring/Monitors/
# monitor = , preferred, auto, 1, mirror, eDP-1

source = $src/general.conf      # ok
source = $src/decoration.conf   # ok
source = $src/animations.conf   # ok
source = $src/input.conf        # wip
source = $src/group.conf        # ok
source = $src/scrolling.conf    # ok
source = $src/bindings.conf     # wip
source = $src/gestures.conf     # ok
source = $src/plugin.conf       # no?
source = $src/autostart.conf    # wip

xwayland {
        force_zero_scaling = true
}


misc {
        disable_hyprland_logo = true
        disable_splash_rendering = false
        disable_scale_notification = false
        col.splash = $text
        font_family = FiraCode Nerd Font
        vrr = 1
        enable_swallow = true # false
        swallow_regex = ^(kitty)$
# more
}

# MORE TO DO HERE!
#

cursor { # in input.lua
    
}


# maybe move these to src/rules.conf
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.0, match:namespace waybar
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.0, match:namespace notifications
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.0, match:namespace wofi
windowrule {
        name = opacity 1.0 override 1.0 override
        match:class = siril
}
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/







