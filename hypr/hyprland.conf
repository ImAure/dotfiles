# ~/.config/hypr/hyprland.conf

$src = ~/.config/hypr/src

source = $src/themes/mocha.conf
source = $src/bindings.conf
source = $src/environment.conf
monitor = eDP-1, 1920x1200@60.04900, 0x0, 1.5 # see https://wiki.hyprland.org/Configuring/Monitors/

source = $src/general.conf
source = $src/scrolling.conf
source = $src/decoration.conf
source = $src/animations.conf
source = $src/input.conf



gestures {
    # see https://wiki.hypr.land/Configuring/Gestures
    workspace_swipe_distance = 300 # 300
    workspace_swipe_invert = true  # true
}

gesture = 3, vertical, workspace
gesture = 3, right, dispatcher, layoutmsg, focus l
gesture = 3, left, dispatcher, layoutmsg, focus r

xwayland {
        force_zero_scaling = true
}

group {
    # see https://wiki.hypr.land/Configuring/Variables#Group
    auto_group = true # true
    insert_after_current = true # true
    focus_removed_window = true # true
    drag_into_group = 1 # true
    merge_groups_on_groupbar = true
    merge_floated_into_tiled_on_groupbar = false
    group_on_movetoworkspace = false


}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = false
    disable_scale_notification = false
    col.splash = $text
    font_family = FiraCode Nerd Font
    vrr = 1
    enable_swallow = true # false
    swallow_regex = ^(kitty)$
    # more
}

# MORE TO DO HERE!
#

cursor {
    
}

source = $src/plugin.conf

##############################################################
############################              ####################
##############################################################

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox
exec-once = hyprlock
exec-once = hyprpaper
exec-once = systemctl start tlp.service
exec-once = systemctl start bluetooth.service
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload -nn && hyprctl dismissnotify
exec-once = waybar
exec-once = wlsunset -t 3000 -T 6500


# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = HYPRCURSOR_THEME, catppuccin-mocha-rosewater-cursors
env = HYPRCURSOR_SIZE, 24

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.0, match:namespace waybar

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/







dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for monnre
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

#master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#    new_is_master = true
#}


