general {
# See https://wiki.hyprland.org/Configuring/Variables/ for more

        border_size     =   1       #d: 2
        gaps_in         =   3
        gaps_out        =  12  #d: 20
        float_gaps      =  10
        gaps_workspaces = -12

        col.inactive_border = rgba($mantleAlphaff)
        col.active_border   = rgba($rosewaterAlphaff) rgba($flamingoAlphaff) 45deg
        # col.nogroup_border =
        # col.nogroup_border_active =
        layout                  = scrolling # dwindle
        no_focus_fallback       = true      # false
        resize_on_border        = true      # false
        extend_border_grab_area = 15        # 15
        hover_icon_on_border    = true      # true 
# Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
        allow_tearing = false # false
        resize_corner = 0     # 0
# modal_parent_blocking
# locale
        snap {
                enabled = true # false
                window_gap = 15 # 10
                monitor_gap = 4 # 10
                border_overlap = true 
                respect_gaps = true
        }
}

workspace = s[true], gapsout:40
workspace = s[true], gapsout:40
