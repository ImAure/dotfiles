general {
# See https://wiki.hyprland.org/Configuring/Variables/ for more

        border_size = 1       #d: 2
        gaps_in = 3
        gaps_out              = 12 #d: 20
        float_gaps            = 10
        gaps_workspaces       = -12

        col.inactive_border = rgba($overlay0Alphaff)
        col.active_border   = rgba($rosewaterAlphaff) rgba($peachAlphaff) 45deg
        # col.nogroup_border
        # col.nogroup_border_active
        layout                  = scrolling # dwindle
        no_focus_fallback       = false   # false
        resize_on_border        = true    # false
        extend_border_grab_area = 10      # 15
        hover_icon_on_border    = true    # true 
# Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
        allow_tearing = false # false
        resize_corner = 0     # 0
# modal_parent_blocking
# locale
        snap {
                enabled = true # false
                window_gap = 15 # 10
                monitor_gap = 10 # 10
                border_overlap = true 
                respect_gaps = true
        }
}

workspace = w[t1], gaps_out = 80
workspace = w[tg1], gaps_out = 80
workspace = w[t2], gaps_out = 40
workspace = w[tg1], gaps_out = 40
workspace = f[1], gaps_out = 80
