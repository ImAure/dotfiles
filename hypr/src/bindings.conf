# ~/.config/hypr/source/bindings.conf

# COOL VARIABLES
$MAINMOD = SUPER
$LMB     = mouse:272
$MMB     = mouse:274
$NOMOD   = # empty, for readibility

$audioUpKey    = XF86AudioRaiseVolume
$audioDownKey  = XF86AudioLowerVolume
$audioMuteKey  = XF86AudioMute
$brightUpKey   = XF86MonBrightnessUp
$brightDownKey = XF86MonBrightnessDown

$terminal     = kitty
$launcherDrun = wofi --show drun -c ~/.config/wofi/config -s ~/.config/wofi/style.css
$launcherRun  = wofi --show  run -c ~/.config/wofi/config -s ~/.config/wofi/style.css
$explorer     = yazi
$tray         = tray-tui  
$chat         = beeper
$altChat      = Telegram
$toggleBar    = pkill waybar || waybar
$moveCursorOutOfTheFuckingWay = hyprctl dispatch movecursor 1919 1079

$audioUp    = wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
$audioDown  = wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
$audioMute  = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
$brightUp   = brightnessctl set +5%
$brightDown = brightnessctl set 5%-

# LIST OF BINDINGS
# MOD           A, FREE
# MOD           B, toggle way(B)ar
# MOD           C, move (C)ursosr in the (C)orner
# MOD           D, FREE
# MOD           E, (E)xplorer (yazi)
# MOD SHIFT     E, toggle hypr(E)xpo
# MOD CTRL      E, (E)xit hyprland
# MOD           F, (F)ullscreen focused app
# MOD SHIFT     F, toggle (F)loating
# MOD           G, toggle (G)roup
# MOD           H, move focus to the left (vim motion left)
# MOD SHIFT     H, move focused window to the left (vim motion left)
# MOD           I, FREE
# MOD           J, move focus to next workspace (vim motion down)
# MOD SHIFT     J, move focused window to newt workspace (vim motion down)
# MOD           K, move focus to previous workspace (vim motion up)
# MOD SHIFT     K, move focused window to previous workspace (vim motion up)
# MOD           L, move focus to the right (vim motion right)
# MOD SHIFT     L, move focused window to the right (vim motion right)
# MOD CTRL      L, hypr(L)ock
# MOD           M, (M)aximize focused window
# MOD           N, change su(N)setr preset
# MOD           O, FREE
# MOD           P, toggle (P)seudo tiling
# MOD           Q, (Q)uit focused window
# MOD           R, (R)un app via wofi
# MOD SHIFT     R, (R)un any binary in $PATH via wofi
# MOD CTRL      R, (R)eload hyprland
# MOD           S, move focus to (S)pecial workspace
# MOD           S, move focused window to (S)pecial workspace
# MOD           T, open (T)ray (T)ui
# MOD           U, FREE
# MOD           V, cycle focused window's size
# MOD           W, lauch beeper (W) as whatsapp
# MOD SHIFT     W, lauch telegram 
# MOD           X, FREE
# MOD           Y, FREE
# MOD           Z, FREE
# MOD           COMMA, resize focused window in small steps
# MOD           PERIOD, resize focused window in small steps

# BASIC UTILITIES
bind = $MAINMOD,        RETURN, exec,   $terminal     # linux user when the doctor tells them their coindition is terminal       
bind = $MAINMOD,        T,      exec,   $terminal $tray 
bind = $MAINMOD,        R,      exec,   $launcherDrun
bind = $MAINMOD SHIFT,  R,      exec,   $launcherRun
bind = $MAINMOD,        W,      exec,   $chat
bind = $MAINMOD SHIFT,  W,      exec,   $altChat
bind = $MAINMOD,        E,      exec,   $terminal $explorer
bind = $MAINMOD,        B,      exec,   $toggleBar
bind = $MAINMOD,        C,      exec,   $moveCursorOutOfTheFuckingWay

# MOTIONS
# hjkl to move focus to adjacent windows (move focus to...) 
bind = $MAINMOD,        H,      layoutmsg,      focus l
bind = $MAINMOD,        L,      layoutmsg,      focus r
bind = $MAINMOD,        K,      workspace,      r-1
bind = $MAINMOD,        J,      workspace,      r+1
# HJKL to swap focused window with adjacent windows (move focused window to...)
bind = $MAINMOD SHIFT,  H,      layoutmsg,      swapcol l
bind = $MAINMOD SHIFT,  L,      layoutmsg,      swapcol r
bind = $MAINMOD SHIFT,  K,      movetoworkspace, r-1
bind = $MAINMOD SHIFT,  J,      movetoworkspace, r+1

# WINDOWS/TILES
bind  = $MAINMOD,       Q,      killactive              # kill focused window
bind  = $MAINMOD,       F,      fullscreen              # borderless fullscreen
bind  = $MAINMOD SHIFT, F,      togglefloating
bind  = $MAINMOD,       M,      fullscreen,     1       # maximize
bind  = $MAINMOD,       V,      layoutmsg,      colresize +conf
bind  = $MAINMOD,       P,      pseudo,                 # dwindle
binde = $MAINMOD,       period, layoutmsg,      colresize +0.02
binde = $MAINMOD,       comma,  layoutmsg,      colresize -0.02
bind  = $MAINMOD,       G,      togglegroup
bindm = $MAINMOD,       $LMB,   resizewindow
bindm = $MAINMOD SHIFT, $LMB,   movewindow



# DESKTOP CONTROLS
bind   = $MAINMOD CTRL, L,              exec,   hyprlock
bind   = $MAINMOD CTRL, E,              exit
bind   = $MAINMOD CTRL, R,              exec,   hyprctl reload
bindle = $NOMOD,        $audioUpKey,    exec,   $audioUp
bindle = $NOMOD,        $audioDownKey,  exec,   $audioDown
bindle = $NOMOD,        $audioMuteKey,  exec,   $audioMute
bindle = $NOMOD,        $brightUpKey,   exec,   $brightUp
bindle = $NOMOD,        $brightDownKey, exec,   $brightDown


bind = $MAINMOD SHIFT, E, hyprexpo:expo, toggle

# Switch workspaces with mainMod + [0-9]
bind = $MAINMOD,        1,      workspace,      1
bind = $MAINMOD,        2,      workspace,      2
bind = $MAINMOD,        3,      workspace,      3
bind = $MAINMOD,        4,      workspace,      4
bind = $MAINMOD,        6,      workspace,      6
bind = $MAINMOD,        5,      workspace,      5
bind = $MAINMOD,        7,      workspace,      7
bind = $MAINMOD,        8,      workspace,      8
bind = $MAINMOD,        9,      workspace,      9
bind = $MAINMOD,        0,      workspace,      10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $MAINMOD SHIFT,  1,      movetoworkspace,        1
bind = $MAINMOD SHIFT,  2,      movetoworkspace,        2
bind = $MAINMOD SHIFT,  3,      movetoworkspace,        3
bind = $MAINMOD SHIFT,  4,      movetoworkspace,        4
bind = $MAINMOD SHIFT,  5,      movetoworkspace,        5
bind = $MAINMOD SHIFT,  6,      movetoworkspace,        6
bind = $MAINMOD SHIFT,  7,      movetoworkspace,        7
bind = $MAINMOD SHIFT,  8,      movetoworkspace,        8
bind = $MAINMOD SHIFT,  9,      movetoworkspace,        9
bind = $MAINMOD SHIFT,  0,      movetoworkspace,        10

# Example special workspace (scratchpad)
bind = $MAINMOD, S, togglespecialworkspace, magic
bind = $MAINMOD SHIFT, S, movetoworkspace, special:magic

