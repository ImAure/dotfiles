# ~/.config/hypr/source/bindings.conf

$mainMod = SUPER

$terminal = kitty
$launcher = wofi --show drun -c ~/.config/wofi/config -s ~/.config/wofi/style.css
$launcher-run = wofi --show run -c ~/.config/wofi/config -s ~/.config/wofi/style.css
$explorer = yazi

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, T,      exec, $terminal
bind = $mainMod, Q,      killactive
bind = $mainMod, V,      togglefloating
bind = $mainMod, R,      exec, $launcher
bind = $mainMod, P,      pseudo, # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, M, fullscreen, 1
#bind = $mainMod SHIFT, J,      togglesplit, # dwindle
bind = $mainMod, G,      togglegroup

binde = $mainMod SHIFT, Q,      killactive
bind = $mainMod SHIFT, RETURN, exec, $terminal
bind = $mainMod SHIFT, R,      exec, $launcher-run

# MOTIONS
bind = $mainMod, H, layoutmsg, focus l
bind = $mainMod, L, layoutmsg, focus r
bind = $mainMod, K, workspace, e-1
bind = $mainMod, J, workspace, e+1
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, K, movetoworkspace, e-1
bind = $mainMod SHIFT, J, movetoworkspace, e+1

bind = $mainMod CTRL, L,      exec, hyprlock
bind = $mainMod SHIFT, E, exit

bind = $mainMod, E, hyprexpo:expo, toggle

# Move focus with mainMod + arrow keys

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod SHIFT, mouse:272, movewindow
bindm = $mainMod, mouse:272, resizewindow
# bind = CTRL, mouse:273, exec, sleep 0.2 && hyprctl dispatch submap reset
#         bind = CTRL, mouse:273, submap, double_right_click
#         submap = double_right_click
#         bind = CTRL, mouse:273, fullscreen, 1
#         bindl = , escape, submap, reset
#         submap = reset
bind = , mouse:274, exec, sleep 0.2 && hyprctl dispatch submap reset
        bind = , mouse:274, submap, double_middle_click
        submap = double_middle_cvisible bind = , mouse:274, fullscreen
        bindl = , escape, submap, reset
        submap = reset


# Custom
bind = $mainMod, f1, exec, firefox www.google.com
bind = CTRL SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = $mainMod, B, exec, pkill waybar || waybar
bind = $mainMod SHIFT, W, exec, killall -q linux-wallpaperengine || linux-wallpaperengine --screen-root eDP-1 --scaling fill --fps 20 --fullscreen-pause-only-active --silent 3327088069 

# bind = SHIFT, space, exec, wtype _
binde = $mainMod, period, layoutmsg, colresize +conf
binde = $mainMod, comma, layoutmsg, colresize -conf
# bind = $mainMod, F, layoutmsg, togglefit 
# bind = $mainMod SHIFT, V, layoutmsg, fit tobeg


# Audio up / down / mute
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bindle = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Brightness up / down
bindle=,XF86MonBrightnessUp,exec,brightnessctl set +5%
bindle=,XF86MonBrightnessDown,exec,brightnessctl set 5%-

